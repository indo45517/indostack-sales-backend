spring:
  application:
    name: billbharat-sales-backend
  datasource:
    url: jdbc:postgresql://localhost:5433/billbharat_sales
    username: billbharat_user
    password: billbharat_secure_pass_2026
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  servlet:
    context-path: /

jwt:
  secret: ${JWT_SECRET:billbharat-super-secret-jwt-key-2026-must-be-at-least-256-bits-long}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.billbharat.sales: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
