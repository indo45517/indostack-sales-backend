version: '3.8'

services:
  postgres-billbharat:
    image: postgres:15-alpine
    container_name: billbharat-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: billbharat_sales
      POSTGRES_USER: billbharat_user
      POSTGRES_PASSWORD: billbharat_secure_pass_2026
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U billbharat_user -d billbharat_sales"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
